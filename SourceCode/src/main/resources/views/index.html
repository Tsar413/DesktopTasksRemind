<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工作待办管理</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; color: #1f2937; }
    body {
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.70), rgba(30, 41, 59, 0.45)),
        url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat fixed;
      padding: 28px;
    }
    .app-shell {
      max-width: 1180px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 24px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.20);
      overflow: hidden;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px 14px;
      background: rgba(255, 255, 255, 0.12);
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      gap: 16px;
      flex-wrap: wrap;
    }
    .title-block h1 {
      margin: 0;
      font-size: 28px;
      color: #ffffff;
    }
    .title-block p {
      margin: 8px 0 0;
      color: rgba(255,255,255,0.88);
      font-size: 14px;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-box {
      width: 260px;
      max-width: 100%;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.72);
      outline: none;
      font-size: 14px;
    }
    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { cursor: not-allowed; opacity: .6; }
    .btn-primary {
      background: #0f172a;
      color: #fff;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
    }
    .btn-light {
      background: rgba(255,255,255,0.78);
      color: #111827;
    }

    .nav-wrap {
      padding: 14px 24px 0;
      background: rgba(255,255,255,0.07);
    }
    .nav-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .nav-tab {
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.92);
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all .15s ease;
    }
    .nav-tab.active {
      background: rgba(255,255,255,0.9);
      color: #0f172a;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      font-weight: 700;
    }
    .nav-count {
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      background: rgba(15,23,42,0.10);
      font-size: 12px;
    }
    .nav-tab.active .nav-count {
      background: rgba(15,23,42,0.08);
    }

    .main-panel {
      padding: 24px;
    }
    .view-panel {
      display: none;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 8px 25px rgba(15, 23, 42, 0.08);
    }
    .view-panel.active { display: block; }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .panel-title {
      margin: 0;
      font-size: 20px;
      color: #111827;
    }
    .panel-subtitle {
      margin: 4px 0 0;
      font-size: 13px;
      color: #6b7280;
    }
    .count-badge {
      min-width: 34px;
      padding: 6px 10px;
      text-align: center;
      border-radius: 999px;
      background: rgba(15,23,42,0.08);
      font-size: 13px;
      color: #0f172a;
      font-weight: 600;
    }

    .task-list {
      display: grid;
      gap: 12px;
      min-height: 80px;
      max-height: calc((152px * 2) + 12px);
      overflow-y: auto;
      padding-right: 6px;
    }
    .task-list::-webkit-scrollbar {
      width: 8px;
    }
    .task-list::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.35);
      border-radius: 999px;
    }
    .task-list::-webkit-scrollbar-track {
      background: rgba(241,245,249,0.7);
      border-radius: 999px;
    }

    .task-card {
      background: rgba(255,255,255,0.9);
      border-radius: 16px;
      padding: 14px;
      border: 1px solid rgba(226,232,240,0.95);
      display: grid;
      gap: 10px;
      position: relative;
      min-height: 140px;
      max-height: 152px;
      overflow: visible;
    }
    .task-card.done {
      opacity: 0.88;
      border-color: rgba(16,185,129,0.35);
      background: rgba(236, 253, 245, 0.92);
    }
    .task-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .task-main {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex: 1;
      min-width: 0;
    }
    .task-check {
      margin-top: 3px;
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-text {
      min-width: 0;
      flex: 1;
    }
    .task-title {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .task-content {
      margin: 7px 0 0;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 44px;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-self: end;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: #334155;
      background: #f1f5f9;
    }
    .pill.long { background: #ede9fe; color: #5b21b6; }
    .pill.deadline { background: #fff7ed; color: #c2410c; }
    .pill.done-tag { background: #dcfce7; color: #166534; }

    .menu-wrap { position: relative; }
    .menu-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: none;
      background: rgba(15,23,42,0.08);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      color: #334155;
    }
    .menu {
      display: none;
    }
    .floating-menu {
      position: fixed;
      min-width: 156px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.20);
      padding: 6px;
      z-index: 9999;
      display: none;
    }
    .floating-menu.show {
      display: block;
    }
    .menu button,
    .floating-menu button {
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
      color: #1f2937;
    }
    .menu button:hover,
    .floating-menu button:hover { background: #f3f4f6; }
    .menu .danger:hover,
    .floating-menu .danger:hover { background: #fef2f2; color: #b91c1c; }

    .empty-box {
      min-height: 180px;
      border: 1px dashed rgba(148,163,184,0.5);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      color: #64748b;
      background: rgba(248,250,252,0.65);
      text-align: center;
      font-size: 14px;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    .modal-mask.show { display: flex; }
    .modal {
      width: min(760px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: rgba(255,255,255,0.97);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 25px 60px rgba(15, 23, 42, 0.28);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 12px;
    }
    .modal-title {
      margin: 0;
      font-size: 22px;
      color: #111827;
    }
    .close-btn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #f3f4f6;
      font-size: 18px;
    }
    .form-grid {
      display: grid;
      gap: 14px;
    }
    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }
    .field input[type="text"],
    .field input[type="datetime-local"],
    .field textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    .field textarea { min-height: 110px; resize: vertical; }
    .field input:focus, .field textarea:focus { border-color: #64748b; }
    .inline-check {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      color: #334155;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .note-view {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.75;
      color: #334155;
      white-space: pre-wrap;
      min-height: 120px;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(24px);
      background: rgba(15,23,42,0.92);
      color: #fff;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: all .2s ease;
      z-index: 120;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      body { padding: 12px; }
      .top-bar, .main-panel { padding: 16px; }
      .nav-wrap { padding: 14px 16px 0; }
      .search-box { width: 100%; }
      .toolbar { width: 100%; }
      .modal { padding: 16px; }
      .task-list { max-height: calc((152px * 2) + 12px); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <div class="title-block">
        <h1>桌面待办记事本</h1>
        <p>顶部导航切换待完成、长时间任务和已完成；每页最多展示约 5 条任务高度，超出后滚动查看。</p>
      </div>
      <div class="toolbar">
        <input id="searchInput" class="search-box" type="text" placeholder="搜索标题、内容、备注..." />
        <button class="btn btn-light" id="refreshBtn">刷新数据</button>
        <button class="btn btn-primary" id="addBtn">新增任务</button>
      </div>
    </div>

    <div class="nav-wrap">
      <div class="nav-bar">
        <button class="nav-tab active" type="button" data-tab="todoPanel">
          <span>待完成</span>
          <span class="nav-count" id="todoNavCount">0</span>
        </button>
        <button class="nav-tab" type="button" data-tab="longPanel">
          <span>长时间任务</span>
          <span class="nav-count" id="longNavCount">0</span>
        </button>
        <button class="nav-tab" type="button" data-tab="donePanel">
          <span>已完成</span>
          <span class="nav-count" id="doneNavCount">0</span>
        </button>
      </div>
    </div>

    <div class="main-panel">
      <section class="view-panel active" id="todoPanel">
        <div class="panel-header">
          <div>
            <h2 class="panel-title">待完成事项</h2>
            <p class="panel-subtitle">短时任务可直接勾选完成，按截止时间显示。</p>
          </div>
          <div class="count-badge" id="todoCount">0</div>
        </div>
        <div id="todoList" class="task-list"></div>
      </section>

      <section class="view-panel" id="longPanel">
        <div class="panel-header">
          <div>
            <h2 class="panel-title">长时间任务</h2>
            <p class="panel-subtitle">长时任务没有截止时间，在待做区不能直接勾选完成。</p>
          </div>
          <div class="count-badge" id="longCount">0</div>
        </div>
        <div id="longList" class="task-list"></div>
      </section>

      <section class="view-panel" id="donePanel">
        <div class="panel-header">
          <div>
            <h2 class="panel-title">已经完成</h2>
            <p class="panel-subtitle">无论是否为长时任务，都可以通过勾选框退回待完成页面。</p>
          </div>
          <div class="count-badge" id="doneCount">0</div>
        </div>
        <div id="doneList" class="task-list"></div>
      </section>
    </div>
  </div>

  <div class="modal-mask" id="formModalMask">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="formTitle">新增任务</h3>
        <button class="close-btn" type="button" id="closeFormBtn">✕</button>
      </div>
      <form id="workForm" class="form-grid">
        <input type="hidden" id="workId" />
        <input type="hidden" id="isFinished" value="0" />

        <div class="field">
          <label for="workTitle">任务标题</label>
          <input type="text" id="workTitle" maxlength="100" placeholder="请输入任务标题" required />
        </div>

        <div class="field">
          <label for="workContent">任务内容</label>
          <textarea id="workContent" placeholder="请输入任务内容"></textarea>
        </div>

        <div class="field">
          <label for="workComment">备注 comment</label>
          <textarea id="workComment" placeholder="可填写任务说明、注意点、补充信息"></textarea>
        </div>

        <div class="field">
          <label class="inline-check">
            <input type="checkbox" id="isLongLifeTask" />
            <span>这是长时间任务（长时任务不设置截止时间）</span>
          </label>
        </div>

        <div class="field" id="deadTimeField">
          <label for="deadTime">截止时间</label>
          <input type="datetime-local" id="deadTime" />
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-light" id="cancelFormBtn">取消</button>
          <button type="submit" class="btn btn-primary" id="submitFormBtn">保存任务</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-mask" id="commentModalMask">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">查看备注</h3>
        <button class="close-btn" type="button" id="closeCommentBtn">✕</button>
      </div>
      <div id="commentView" class="note-view"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-primary" id="commentOkBtn">知道了</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = {
      todo: '/api/work/works/todo',
      longLife: '/api/work/works/longLife',
      done: '/api/work/works/done',
      add: '/api/work/works',
      update: '/api/work/works',
      toggleStatus: (id) => `/api/work/works/${id}`,
      delete: (id) => `/api/work/works/${id}`
    };

    const state = {
      todoList: [],
      longList: [],
      doneList: [],
      keyword: '',
      activeTab: 'todoPanel'
    };

    const els = {
      todoList: document.getElementById('todoList'),
      longList: document.getElementById('longList'),
      doneList: document.getElementById('doneList'),
      todoCount: document.getElementById('todoCount'),
      longCount: document.getElementById('longCount'),
      doneCount: document.getElementById('doneCount'),
      todoNavCount: document.getElementById('todoNavCount'),
      longNavCount: document.getElementById('longNavCount'),
      doneNavCount: document.getElementById('doneNavCount'),
      refreshBtn: document.getElementById('refreshBtn'),
      addBtn: document.getElementById('addBtn'),
      searchInput: document.getElementById('searchInput'),
      formModalMask: document.getElementById('formModalMask'),
      commentModalMask: document.getElementById('commentModalMask'),
      formTitle: document.getElementById('formTitle'),
      workForm: document.getElementById('workForm'),
      workId: document.getElementById('workId'),
      workTitle: document.getElementById('workTitle'),
      workContent: document.getElementById('workContent'),
      workComment: document.getElementById('workComment'),
      isLongLifeTask: document.getElementById('isLongLifeTask'),
      deadTime: document.getElementById('deadTime'),
      deadTimeField: document.getElementById('deadTimeField'),
      isFinished: document.getElementById('isFinished'),
      closeFormBtn: document.getElementById('closeFormBtn'),
      cancelFormBtn: document.getElementById('cancelFormBtn'),
      submitFormBtn: document.getElementById('submitFormBtn'),
      commentView: document.getElementById('commentView'),
      closeCommentBtn: document.getElementById('closeCommentBtn'),
      commentOkBtn: document.getElementById('commentOkBtn'),
      toast: document.getElementById('toast'),
      tabs: Array.from(document.querySelectorAll('.nav-tab')),
      panels: Array.from(document.querySelectorAll('.view-panel'))
    };

    document.addEventListener('click', () => closeAllMenus());
    document.addEventListener('DOMContentLoaded', init);

    function init() {
      bindEvents();
      switchTab(state.activeTab);
      loadAll();
    }

    function bindEvents() {
      els.refreshBtn.addEventListener('click', loadAll);
      els.addBtn.addEventListener('click', () => openFormModal());
      els.searchInput.addEventListener('input', (e) => {
        state.keyword = e.target.value.trim().toLowerCase();
        renderAll();
      });

      els.tabs.forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
      });

      bindFloatingMenuEvents();

      els.isLongLifeTask.addEventListener('change', handleLongTaskToggle);
      els.closeFormBtn.addEventListener('click', closeFormModal);
      els.cancelFormBtn.addEventListener('click', closeFormModal);
      els.closeCommentBtn.addEventListener('click', closeCommentModal);
      els.commentOkBtn.addEventListener('click', closeCommentModal);

      els.formModalMask.addEventListener('click', (e) => {
        if (e.target === els.formModalMask) closeFormModal();
      });
      els.commentModalMask.addEventListener('click', (e) => {
        if (e.target === els.commentModalMask) closeCommentModal();
      });

      els.workForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        await submitForm();
      });
    }

    function switchTab(tabId) {
      state.activeTab = tabId;
      els.tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.tab === tabId));
      els.panels.forEach(panel => panel.classList.toggle('active', panel.id === tabId));
    }

    async function loadAll() {
      try {
        const [todoList, longList, doneList] = await Promise.all([
          getJson(API.todo),
          getJson(API.longLife),
          getJson(API.done)
        ]);
        state.todoList = Array.isArray(todoList) ? todoList : [];
        state.longList = Array.isArray(longList) ? longList : [];
        state.doneList = Array.isArray(doneList) ? doneList : [];
        renderAll();
      } catch (error) {
        console.error(error);
        toast('加载数据失败，请检查后端接口是否正常启动');
      }
    }

    function renderAll() {
      const todoData = filterList(state.todoList);
      const longData = filterList(state.longList);
      const doneData = filterList(state.doneList);

      renderSection(els.todoList, todoData, 'todo');
      renderSection(els.longList, longData, 'long');
      renderSection(els.doneList, doneData, 'done');

      els.todoCount.textContent = todoData.length;
      els.longCount.textContent = longData.length;
      els.doneCount.textContent = doneData.length;

      els.todoNavCount.textContent = todoData.length;
      els.longNavCount.textContent = longData.length;
      els.doneNavCount.textContent = doneData.length;
    }

    function filterList(list) {
      if (!state.keyword) return list;
      return list.filter(item => {
        const source = [item.workTitle, item.workContent, item.workComment]
          .filter(Boolean)
          .join(' ')
          .toLowerCase();
        return source.includes(state.keyword);
      });
    }

    function renderSection(container, list, type) {
      if (!list.length) {
        let text = '当前没有数据';
        if (type === 'todo') text = '暂无待完成事项，点击右上角“新增任务”开始记录。';
        if (type === 'long') text = '暂无长时间任务。';
        if (type === 'done') text = '暂无已完成任务。';
        container.innerHTML = `<div class="empty-box">${text}</div>`;
        return;
      }
      container.innerHTML = list.map(item => createTaskCard(item, type)).join('');
      bindCardEvents(container);
    }

    function createTaskCard(item, type) {
      const escapedTitle = escapeHtml(item.workTitle || '未命名任务');
      const escapedContent = escapeHtml(item.workContent || '');
      const isLong = Number(item.isLongLifeTask) === 1;
      const isDone = Number(item.isFinished) === 1;
      const showCheckbox = (type === 'todo' && !isLong) || type === 'done';
      const checkboxChecked = isDone ? 'checked' : '';
      const deadlineHtml = !isLong && item.deadTime
        ? `<span class="pill deadline">截止：${formatDateTime(item.deadTime)}</span>`
        : '';
      const longHtml = isLong ? '<span class="pill long">长时间任务</span>' : '';
      const doneHtml = isDone ? '<span class="pill done-tag">已完成</span>' : '';

      return `
        <div class="task-card ${isDone ? 'done' : ''}" data-id="${item.workId}">
          <div class="task-top">
            <div class="task-main">
              ${showCheckbox ? `<input class="task-check" type="checkbox" data-action="toggle" data-id="${item.workId}" ${checkboxChecked} />` : ''}
              <div class="task-text">
                <h3 class="task-title" title="${escapedTitle}">${escapedTitle}</h3>
                <p class="task-content" title="${escapedContent}">${escapedContent || '暂无任务内容'}</p>
              </div>
            </div>
            <div class="menu-wrap">
              <button class="menu-btn" type="button" data-action="menu" data-id="${item.workId}" data-type="${type}">⋯</button>
            </div>
          </div>
          <div class="task-meta">
            ${longHtml}
            ${deadlineHtml}
            ${doneHtml}
            <span class="pill">创建：${formatDateTime(item.submitTime)}</span>
          </div>
        </div>
      `;
    }

    function bindCardEvents(container) {
      container.querySelectorAll('[data-action="menu"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openFloatingMenu(btn, btn.dataset.id, btn.dataset.type);
        });
      });

      container.querySelectorAll('[data-action="toggle"]').forEach(box => {
        box.addEventListener('click', async (e) => {
          e.stopPropagation();
          await toggleStatus(box.dataset.id);
        });
      });
    }

    function bindFloatingMenuEvents() {
      const menu = document.getElementById('floatingMenu');
      if (!menu) {
        console.error('floatingMenu 节点未找到，无法绑定菜单事件');
        return;
      }

      menu.addEventListener('click', async (e) => {
        const action = e.target.dataset.menuAction;
        if (!action || !state.activeMenuId) return;
        e.stopPropagation();

        const item = findWorkById(state.activeMenuId);
        if (!item) {
          closeAllMenus();
          return;
        }

        if (action === 'comment') {
          openCommentModal(item);
          closeAllMenus();
          return;
        }

        if (action === 'edit') {
          openFormModal(item);
          closeAllMenus();
          return;
        }

        if (action === 'complete') {
          closeAllMenus();
          await toggleStatus(item.workId);
          return;
        }

        if (action === 'delete') {
          closeAllMenus();
          const ok = window.confirm(`确定删除任务“${item.workTitle || ''}”吗？`);
          if (!ok) return;
          await removeWork(item.workId);
        }
      });
    }

    function openFloatingMenu(btn, id, type) {
      const rect = btn.getBoundingClientRect();
      const menu = document.getElementById('floatingMenu');
      if (!menu) {
        console.error('floatingMenu 节点未找到');
        return;
      }

      const willShow = !(menu.classList.contains('show') && state.activeMenuId === id);

      closeAllMenus();
      if (!willShow) return;

      state.activeMenuId = id;
      state.activeMenuType = type || null;

      const completeBtn = menu.querySelector('[data-menu-action="complete"]');
      if (completeBtn) {
        completeBtn.style.display = type === 'long' ? 'block' : 'none';
      }

      menu.style.visibility = 'hidden';
      menu.style.display = 'block';

      const menuWidth = menu.offsetWidth || 156;
      const menuHeight = menu.offsetHeight || 120;
      const gap = 8;
      let left = rect.right - menuWidth;
      let top = rect.bottom + gap;

      if (left < 12) left = 12;
      if (left + menuWidth > window.innerWidth - 12) {
        left = window.innerWidth - menuWidth - 12;
      }
      if (top + menuHeight > window.innerHeight - 12) {
        top = rect.top - menuHeight - gap;
      }
      if (top < 12) top = 12;

      menu.style.left = `${left}px`;
      menu.style.top = `${top}px`;
      menu.style.display = '';
      menu.style.visibility = '';
      menu.classList.add('show');
    }

    function closeAllMenus() {
      state.activeMenuId = null;
      state.activeMenuType = null;
      const menu = document.getElementById('floatingMenu');
      if (!menu) return;
      menu.classList.remove('show');
      menu.style.left = '';
      menu.style.top = '';
      menu.style.display = '';
      menu.style.visibility = '';
    }

    function findWorkById(id) {
      return [...state.todoList, ...state.longList, ...state.doneList].find(item => item.workId === id);
    }

    function openFormModal(item) {
      const isEdit = !!item;
      els.formTitle.textContent = isEdit ? '修改任务' : '新增任务';
      els.workId.value = item?.workId || '';
      els.workTitle.value = item?.workTitle || '';
      els.workContent.value = item?.workContent || '';
      els.workComment.value = item?.workComment || '';
      els.isLongLifeTask.checked = Number(item?.isLongLifeTask || 0) === 1;
      els.isFinished.value = String(Number(item?.isFinished || 0));
      els.deadTime.value = formatForInput(item?.deadTime);
      handleLongTaskToggle();
      els.formModalMask.classList.add('show');
      setTimeout(() => els.workTitle.focus(), 20);
    }

    function closeFormModal() {
      els.workForm.reset();
      els.workId.value = '';
      els.isFinished.value = '0';
      els.deadTime.disabled = false;
      els.deadTimeField.style.opacity = '1';
      els.formModalMask.classList.remove('show');
    }

    function handleLongTaskToggle() {
      const isLong = els.isLongLifeTask.checked;
      els.deadTime.disabled = isLong;
      if (isLong) els.deadTime.value = '';
      els.deadTimeField.style.opacity = isLong ? '0.55' : '1';
    }

    async function submitForm() {
      const isLong = els.isLongLifeTask.checked;
      const title = els.workTitle.value.trim();
      if (!title) {
        toast('请输入任务标题');
        els.workTitle.focus();
        return;
      }
      if (!isLong && !els.deadTime.value) {
        toast('短时任务必须填写截止时间');
        els.deadTime.focus();
        return;
      }

      const payload = {
        workId: els.workId.value || undefined,
        workTitle: title,
        workContent: els.workContent.value.trim(),
        workComment: els.workComment.value.trim(),
        isFinished: Number(els.isFinished.value || 0),
        isLongLifeTask: isLong ? 1 : 0,
        deadTime: isLong ? null : formatForBackend(els.deadTime.value)
      };

      try {
        const isEdit = !!els.workId.value;
        const url = isEdit ? API.update : API.add;
        const method = isEdit ? 'PUT' : 'POST';
        await request(url, { method, body: JSON.stringify(payload) });
        toast(isEdit ? '任务修改成功' : '任务新增成功');
        closeFormModal();
        await loadAll();
      } catch (error) {
        console.error(error);
        toast(error.message || '保存失败');
      }
    }

    function openCommentModal(item) {
      const comment = item?.workComment?.trim() ? escapeHtml(item.workComment) : '暂无备注内容';
      els.commentView.innerHTML = comment.replace(/\n/g, '<br>');
      els.commentModalMask.classList.add('show');
    }

    function closeCommentModal() {
      els.commentModalMask.classList.remove('show');
    }

    async function toggleStatus(id) {
      try {
        await request(API.toggleStatus(id), { method: 'PUT' });
        toast('任务状态已更新');
        await loadAll();
      } catch (error) {
        console.error(error);
        toast(error.message || '状态修改失败');
      }
    }

    async function removeWork(id) {
      try {
        await request(API.delete(id), { method: 'DELETE' });
        toast('任务删除成功');
        await loadAll();
      } catch (error) {
        console.error(error);
        toast(error.message || '删除失败');
      }
    }

    async function getJson(url) {
      const response = await fetch(url, {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
      });
      if (!response.ok) throw new Error(`接口请求失败：${response.status}`);
      return response.json();
    }

    async function request(url, options = {}) {
      const response = await fetch(url, {
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json, text/plain, */*'
        },
        ...options
      });
      const text = await response.text();
      if (!response.ok) {
        throw new Error(text || `请求失败：${response.status}`);
      }
      return text;
    }

    function formatDateTime(value) {
      if (!value) return '无';
      const normalized = String(value).replace('T', ' ');
      return normalized.length >= 19 ? normalized.slice(0, 19) : normalized;
    }

    function formatForInput(value) {
      if (!value) return '';
      const normalized = String(value).replace(' ', 'T');
      return normalized.length >= 16 ? normalized.slice(0, 16) : normalized;
    }

    function formatForBackend(value) {
      if (!value) return null;
      return `${value.replace('T', ' ')}:00`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    let toastTimer = null;
    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove('show'), 2200);
    }
  </script>

  <div id="floatingMenu" class="floating-menu">
    <button type="button" data-menu-action="comment">查看备注</button>
    <button type="button" data-menu-action="edit">修改信息</button>
    <button type="button" data-menu-action="complete">标记完成</button>
    <button type="button" data-menu-action="delete" class="danger">删除任务</button>
  </div>

</body>
</html>
